# ============================================================================
# CONFIGURACIÓN DE NGINX PARA FARMAGO DASHBOARD
# Servidor: 190.187.184.138
# ============================================================================
#
# INSTRUCCIONES DE INSTALACIÓN:
# 1. Copiar este archivo a: /etc/nginx/sites-available/farmago-dashboard
# 2. Crear enlace simbólico: sudo ln -s /etc/nginx/sites-available/farmago-dashboard /etc/nginx/sites-enabled/
# 3. Verificar configuración: sudo nginx -t
# 4. Reiniciar Nginx: sudo systemctl restart nginx
#
# ============================================================================

server {
    listen 80;
    server_name 190.187.184.138;

    # Logs
    access_log /var/log/nginx/farmago-access.log;
    error_log /var/log/nginx/farmago-error.log;

    # Tamaño máximo de body (para uploads si es necesario)
    client_max_body_size 10M;

    # Frontend estático (React build)
    location / {
        # IMPORTANTE: Reemplazar con la ruta real donde está tu proyecto
        root /home/tu_usuario/farmago-dashboard/dist;
        try_files $uri $uri/ /index.html;
        
        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Proxy para el backend API
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        
        # Headers necesarios para proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket para Socket.IO
    location /socket.io {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        
        # Headers necesarios para WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts para WebSocket (más largos)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3001/api/health;
        access_log off;
    }
}

# ============================================================================
# CONFIGURACIÓN OPCIONAL PARA HTTPS (Let's Encrypt)
# ============================================================================
# 
# Después de configurar HTTP, puedes agregar HTTPS con:
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d 190.187.184.138
#
# Certbot modificará automáticamente este archivo para agregar SSL
#
