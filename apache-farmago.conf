<VirtualHost *:80>
    ServerName 172.17.1.204
    DocumentRoot /var/www

    # Redirigir raíz a /Farmago
    RedirectMatch ^/$ /Farmago/

    # ========================================
    # PROXY (DEBE IR ANTES DEL ALIAS)
    # ========================================
    
    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket (PRIMERO)
    ProxyPass /Farmago/socket.io http://localhost:3001/socket.io
    ProxyPassReverse /Farmago/socket.io http://localhost:3001/socket.io

    # API
    ProxyPass /Farmago/api http://localhost:3001/api
    ProxyPassReverse /Farmago/api http://localhost:3001/api

    # WebSocket upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /Farmago/socket.io/(.*) ws://localhost:3001/socket.io/$1 [P,L]

    # ========================================
    # FRONTEND ESTÁTICO
    # ========================================
    
    Alias /Farmago /var/www/Farmago/dist

    <Directory /var/www/Farmago/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /Farmago/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /Farmago/index.html [L]
    </Directory>

    # ========================================
    # LOGS
    # ========================================
    
    ErrorLog ${APACHE_LOG_DIR}/farmago-error.log
    CustomLog ${APACHE_LOG_DIR}/farmago-access.log combined
</VirtualHost>
